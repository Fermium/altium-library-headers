name: Publish to Sideband

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # The repo only sends data; Sideband renders previews + publishes the entry.
      - run: python publish.py
        env:
          SIDEBAND_API_URL: ${{ secrets.SIDEBAND_API_URL }}
          SIDEBAND_CATALOG_URL: ${{ secrets.SIDEBAND_CATALOG_URL }}
          SIDEBAND_PUBLISH_TOKEN: ${{ secrets.SIDEBAND_PUBLISH_TOKEN }}
